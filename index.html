<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>간단한 페이지</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            padding: 50px;
        }
        h1 {
            color: #4CAF50;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>안녕하세요 👋</h1>
    <p>이것은 아주 간단한 HTML 예제입니다.</p>
    <button onclick="alert('버튼이 클릭되었습니다!')">클릭해보세요</button>

</body>
</html>
